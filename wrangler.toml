name = "mailias-api"
main = "index.js"
compatibility_date = "2024-01-01"

# Public (non-sensitive) vars
[vars]
CF_ACCOUNT_ID    = "your_account_id"
CF_ZONE_ID       = "your_zone_id"
CF_DOMAIN        = "yourdomain.com"
OIDC_ISSUER      = "https://pocket-id.yourdomain.com"
OIDC_JWKS_URI    = "https://pocket-id.yourdomain.com/.well-known/jwks.json"
FRONTEND_URL     = "https://mailias.yourdomain.com"
# FRONTEND_URL_DEV = "http://localhost:5173"   # uncomment for local development

# Email send binding (Cloudflare Workers Email)
# Requires the domain to be verified in Cloudflare Email Routing.
[[send_email]]
name = "EMAIL"

# Secrets — set via CLI:
#   wrangler secret put CF_API_TOKEN
#   wrangler secret put ALLOWED_EMAIL
#
# CF_API_TOKEN requires the following permissions:
#   - Zone > Email Routing Rules > Edit
#   - Zone > Email Routing Addresses > Read
#   - Account > Email Routing > Read