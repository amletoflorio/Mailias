server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Necessario quando sta dietro un reverse proxy (NPM / Cloudflare)
    absolute_redirect off;
    proxy_redirect    off;

    # File statici root (favicon, manifest, icone PWA)
    location ~* ^/(favicon\.svg|icon-.*\.png|apple-touch-icon\.png|manifest\.json)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
